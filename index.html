<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSense Dental AI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app" id="app">

        <!-- AUTH VIEW -->
        <div id="view-auth" class="auth-wrap page-fade">
            <div class="auth-card">
                <div class="auth-logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24"><path d="M12 2C9.5 2 7.5 3.5 7.5 6c0 1.2.5 2.2 1.3 3l-.3 1.5C8 11 8.5 11.5 9 11.5h6c.5 0 1-.5.8-1L15.2 9C16 8.2 16.5 7.2 16.5 6c0-2.5-2-4-4.5-4zM9 13l-2 7h10l-2-7H9z"/></svg>
                    </div>
                    <span style="font-size:16px;font-weight:500">DeepSense Dental AI</span>
                </div>

                <!-- Illustration -->
                <div class="ai-illus">
                    <svg width="220" height="80" viewBox="0 0 220 80">
                        <rect x="20" y="30" width="22" height="30" rx="5" fill="var(--color-background-secondary)" stroke="var(--color-border-secondary)" stroke-width="1"/>
                        <rect x="46" y="20" width="26" height="40" rx="6" fill="var(--color-background-secondary)" stroke="var(--color-border-secondary)" stroke-width="1"/>
                        <rect x="76" y="18" width="26" height="42" rx="6" fill="var(--color-background-secondary)" stroke="var(--color-border-secondary)" stroke-width="1"/>
                        <rect x="106" y="18" width="26" height="42" rx="6" fill="var(--color-background-secondary)" stroke="var(--color-border-secondary)" stroke-width="1"/>
                        <rect x="136" y="20" width="26" height="40" rx="6" fill="var(--color-background-secondary)" stroke="var(--color-border-secondary)" stroke-width="1"/>
                        <rect x="166" y="30" width="22" height="30" rx="5" fill="var(--color-background-secondary)" stroke="var(--color-border-secondary)" stroke-width="1"/>
                        <line x1="15" y1="45" x2="205" y2="45" stroke="#178fd4" stroke-width="1.5" stroke-dasharray="4 3" opacity=".6"/>
                        <rect x="76" y="18" width="26" height="42" rx="6" fill="#e24b4a" fill-opacity=".15" stroke="#e24b4a" stroke-width="1.5"/>
                        <circle cx="89" cy="36" r="4" fill="#e24b4a" fill-opacity=".5"/>
                        <rect x="105" y="8" width="60" height="16" rx="4" fill="#178fd4" fill-opacity=".1"/>
                        <text x="135" y="19" font-size="9" fill="#178fd4" text-anchor="middle" font-family="sans-serif">AI detected</text>
                        <line x1="99" y1="24" x2="120" y2="16" stroke="#178fd4" stroke-width="0.7" stroke-dasharray="2 2"/>
                    </svg>
                </div>

                <div id="auth-tabs" class="auth-tabs">
                    <button class="auth-tab active" onclick="switchAuthTab('login')">Login</button>
                    <button class="auth-tab" onclick="switchAuthTab('signup')">Sign up</button>
                </div>

                <!-- LOGIN FORM -->
                <div id="login-form">
                    <div class="field">
                        <label>Role</label>
                        <div class="role-pills">
                            <button class="role-pill active" onclick="selectRole(this,'Dentist')">Dentist</button>
                            <button class="role-pill" onclick="selectRole(this,'Patient')">Patient</button>
                        </div>
                    </div>
                    <div class="field"><label>Email address</label><input type="email" placeholder="you@example.com" id="login-email"/></div>
                    <div class="field"><label>Password</label><input type="password" placeholder="••••••••" id="login-pass"/></div>
                    <a style="font-size:12px;color:var(--blue);cursor:pointer;display:block;text-align:right;margin-bottom:1rem" onclick="openForgotPassword()">Forgot password?</a>
                    <button class="btn-primary" onclick="doLogin()">Login</button>
                    <div class="auth-footer">Don't have an account? <a onclick="switchAuthTab('signup')">Sign up</a></div>
                </div>

                <!-- SIGNUP FORM -->
                <div id="signup-form" class="hidden">
                    <div class="field"><label>Full name</label><input type="text" placeholder="Dr. John Smith"/></div>
                    <div class="field"><label>Email address</label><input type="email" placeholder="you@example.com"/></div>
                    <div class="field"><label>Password</label><input type="password" placeholder="••••••••"/></div>
                    <div class="field">
                        <label>Role</label>
                        <div class="role-pills">
                            <button class="role-pill active" onclick="selectRole(this,'Dentist')">Dentist</button>
                            <button class="role-pill" onclick="selectRole(this,'Patient')">Patient</button>
                        </div>
                    </div>
                    <button class="btn-primary" onclick="doLogin()">Create account</button>
                    <div class="auth-footer">Already have an account? <a onclick="switchAuthTab('login')">Login</a></div>
                </div>
            </div>
        </div>

        <!-- MAIN APP -->
        <div id="view-main" class="main-layout hidden">
            <!-- SIDEBAR -->
            <div class="sidebar">
                <div class="sidebar-logo">
                    <div class="logo-icon" style="width:28px;height:28px;border-radius:6px">
                        <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:white"><path d="M12 2C9.5 2 7.5 3.5 7.5 6c0 1.2.5 2.2 1.3 3l-.3 1.5C8 11 8.5 11.5 9 11.5h6c.5 0 1-.5.8-1L15.2 9C16 8.2 16.5 7.2 16.5 6c0-2.5-2-4-4.5-4zM9 13l-2 7h10l-2-7H9z"/></svg>
                    </div>
                    <span>DeepSense</span>
                </div>
                <div id="sidebar-nav"></div>
                <div class="sidebar-bottom">
                    <div class="user-chip">
                        <div class="avatar" id="sidebar-avatar">DS</div>
                        <div>
                            <div style="font-size:12px;font-weight:500;color:var(--color-text-primary)" id="sidebar-name">Dr. Smith</div>
                            <div style="font-size:11px" id="sidebar-role">Dentist</div>
                        </div>
                    </div>
                    <button class="btn-sm" style="width:100%;margin-top:8px;font-size:12px" onclick="logout()">Sign out</button>
                </div>
            </div>

            <!-- CONTENT AREA -->
            <div class="content" id="main-content"></div>
        </div>

        <!-- MODAL -->
        <div id="modal" class="modal-overlay hidden">
            <div class="modal" id="modal-inner"></div>
        </div>

        <!-- NOTIFICATION -->
        <div id="notif" class="notif hidden"></div>

    </div>

    <script src="script.js"></script>
</body>
</html>
